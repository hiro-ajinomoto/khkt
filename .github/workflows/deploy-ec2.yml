name: Deploy to EC2

# Tự động deploy backend/frontend lên EC2 mỗi khi có commit vào main.
# Workflow tự suy scope deploy từ các path đã đổi để tiết kiệm thời gian:
#   - Chỉ fe/khkt/** đổi → deploy frontend (không reload backend)
#   - Chỉ be/** đổi      → deploy backend
#   - Cả hai, hoặc đổi deploy-ec2.sh/nginx/workflow → deploy all
#
# Có thể chạy tay qua "Run workflow" ở tab Actions và chọn scope deploy.

on:
  push:
    branches: [main]
    paths:
      # Chỉ trigger khi có thay đổi thực sự ảnh hưởng đến BE/FE hoặc script
      # deploy, tránh tốn minutes khi sửa docs.
      - "be/**"
      - "fe/khkt/**"
      - "deploy-ec2.sh"
      - "nginx.conf.example"
      - ".github/workflows/deploy-ec2.yml"
  workflow_dispatch:
    inputs:
      scope:
        description: "What to deploy"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - all
          - backend
          - frontend

# Không cho 2 run deploy chạy song song trên main — pull code + pm2 reload
# có thể đạp nhau. Hủy run cũ nếu có push mới.
concurrency:
  group: deploy-ec2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    environment: production
    # Host/user có thể để Variables (public IP) hoặc Secrets; rsync cần env thật, không rỗng.
    env:
      DEPLOY_SSH_HOST: ${{ secrets.EC2_HOST || vars.EC2_HOST }}
      DEPLOY_SSH_USER: ${{ secrets.EC2_USER || vars.EC2_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      DEPLOY_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Lấy đủ history để so diff (before/after push hoặc HEAD~1 khi chạy tay).
          fetch-depth: 0

      # Không dùng dorny/paths-filter: trên runner mới đôi khi git exit 128 trong action đó.
      - name: Detect changed paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if ! git rev-parse -q --verify "HEAD~1" >/dev/null; then
            echo "Single-commit history; mark all path groups true."
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "infra=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              RANGE="HEAD~1..HEAD"
            elif git merge-base --is-ancestor "$BEFORE" HEAD 2>/dev/null; then
              RANGE="${BEFORE}..HEAD"
            else
              echo "before is not an ancestor of HEAD; using HEAD~1..HEAD"
              RANGE="HEAD~1..HEAD"
            fi
          else
            RANGE="HEAD~1..HEAD"
          fi

          echo "Path filter range: $RANGE"
          backend=false
          frontend=false
          infra=false
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in
              be/*) backend=true ;;
            esac
            case "$line" in
              fe/khkt/*) frontend=true ;;
            esac
            case "$line" in
              deploy-ec2.sh|nginx.conf.example|.github/workflows/deploy-ec2.yml) infra=true ;;
            esac
          done < <(git diff --name-only "$RANGE" 2>/dev/null || true)

          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "infra=$infra" >> "$GITHUB_OUTPUT"
          echo "Detected: backend=$backend frontend=$frontend infra=$infra"

      - name: Determine deploy scope
        id: scope
        run: |
          set -euo pipefail
          INPUT_SCOPE="${{ github.event.inputs.scope || 'auto' }}"

          # Nếu người dùng chỉ định scope cố định qua workflow_dispatch thì
          # tôn trọng lựa chọn đó; 'auto' (mặc định) rơi vào nhánh suy diễn.
          case "$INPUT_SCOPE" in
            all|backend|frontend)
              echo "value=$INPUT_SCOPE" >> "$GITHUB_OUTPUT"
              echo "Manual scope override: $INPUT_SCOPE"
              exit 0
              ;;
          esac

          BE="${{ steps.changes.outputs.backend }}"
          FE="${{ steps.changes.outputs.frontend }}"
          INFRA="${{ steps.changes.outputs.infra }}"

          echo "Changed: backend=$BE frontend=$FE infra=$INFRA"

          # Đổi script deploy / nginx / workflow → deploy all cho an toàn
          # (script/cấu hình mới có thể ảnh hưởng cả hai tầng).
          if [ "$INFRA" = "true" ]; then
            echo "value=all" >> "$GITHUB_OUTPUT"
          elif [ "$BE" = "true" ] && [ "$FE" = "true" ]; then
            echo "value=all" >> "$GITHUB_OUTPUT"
          elif [ "$FE" = "true" ]; then
            echo "value=frontend" >> "$GITHUB_OUTPUT"
          elif [ "$BE" = "true" ]; then
            echo "value=backend" >> "$GITHUB_OUTPUT"
          else
            # Không có path nào match (hiếm gặp vì `on.push.paths` đã lọc);
            # chạy all để chắc chắn đồng bộ code mới nhất.
            echo "value=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Show resolved scope
        run: echo "Deploying scope → ${{ steps.scope.outputs.value }}"

      - name: Validate EC2 SSH settings
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_SSH_HOST// }" ] || [ -z "${DEPLOY_SSH_USER// }" ]; then
            echo "::error::EC2_HOST hoặc EC2_USER đang rỗng. Vào Settings → Secrets and variables → Actions:"
            echo "  - Thêm Repository secrets: EC2_HOST, EC2_USER, EC2_SSH_KEY (và tùy chọn EC2_SSH_PORT), hoặc"
            echo "  - Thêm cùng tên trong Environment **production**, hoặc dùng Variables EC2_HOST / EC2_USER (IP + user không nhạy cảm)."
            exit 1
          fi
          if [ -z "${DEPLOY_SSH_KEY:-}" ]; then
            echo "::error::Thiếu secret EC2_SSH_KEY."
            exit 1
          fi

      # Repo private: EC2 thường không có quyền `git fetch` → exit 128.
      # Đẩy mã từ runner (đã checkout bằng GITHUB_TOKEN) lên máy chủ.
      - name: Rsync repository to EC2
        run: |
          set -euo pipefail
          PORT="${DEPLOY_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -p "$PORT" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          RSYNC_RSH="ssh -i $HOME/.ssh/ec2_deploy_key -o StrictHostKeyChecking=accept-new -p $PORT"
          rsync -az \
            -e "$RSYNC_RSH" \
            --exclude '.git' \
            --exclude 'be/node_modules' \
            --exclude 'fe/khkt/node_modules' \
            --exclude '.cursor' \
            ./ "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}:/home/ec2-user/khkt/"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ env.DEPLOY_SSH_HOST }}
          username: ${{ env.DEPLOY_SSH_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_SSH_PORT != '' && env.DEPLOY_SSH_PORT || 22 }}
          # 15 phút đủ cho backend npm ci + frontend npm run build trên t2.micro.
          command_timeout: 15m
          script_stop: true
          envs: DEPLOY_SCOPE
          script: |
            set -euo pipefail
            cd /home/ec2-user/khkt
            chmod +x deploy-ec2.sh
            ./deploy-ec2.sh "$DEPLOY_SCOPE"
        env:
          DEPLOY_SCOPE: ${{ steps.scope.outputs.value }}

      - name: Health check (backend)
        # Chỉ ping /health khi scope có động đến backend — deploy FE thuần
        # không reload pm2 nên không cần chờ backend "lên lại".
        if: steps.scope.outputs.value == 'all' || steps.scope.outputs.value == 'backend'
        run: |
          HOST="${{ env.DEPLOY_SSH_HOST }}"
          SCHEME="${{ secrets.HEALTHCHECK_SCHEME || 'http' }}"
          HEALTH_URL="${SCHEME}://${HOST}/health"
          echo "Pinging $HEALTH_URL"
          for i in 1 2 3 4 5; do
            if curl --fail --silent --show-error --max-time 10 "$HEALTH_URL" | tee /dev/stderr | grep -q '"ok"'; then
              echo "✅ Backend healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Health check (frontend)
        # Khi deploy FE, chỉ cần đảm bảo nginx serve được index.html mới.
        if: steps.scope.outputs.value == 'all' || steps.scope.outputs.value == 'frontend'
        run: |
          HOST="${{ env.DEPLOY_SSH_HOST }}"
          SCHEME="${{ secrets.HEALTHCHECK_SCHEME || 'http' }}"
          URL="${SCHEME}://${HOST}/"
          echo "Fetching $URL"
          for i in 1 2 3 4 5; do
            if curl --fail --silent --show-error --max-time 10 "$URL" | grep -qi '<!doctype html'; then
              echo "✅ Frontend healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "❌ Frontend health check failed"
          exit 1
